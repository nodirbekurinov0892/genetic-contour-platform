name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: genetic_contour
          POSTGRES_PASSWORD: genetic_contour_secret
          POSTGRES_DB: genetic_contour_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genetic_contour"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://genetic_contour:genetic_contour_secret@localhost:5432/genetic_contour_test
          SECRET_KEY: test-secret-key-for-ci-only-32chars
          JWT_SECRET: test-jwt-secret-for-ci-only-32chars
          API_DEBUG: "true"
          STORAGE_BACKEND: local
          TRUSTED_HOSTS: testserver,localhost,127.0.0.1
          REDIS_URL: redis://localhost:6379/0
          EXPERIMENT_QUEUE_BACKEND: asyncio
          MPLBACKEND: Agg
        run: |
          set +e
          pytest -q --tb=short --timeout=90 --junit-xml=pytest-results.xml
          code=$?
          if [ $code -ne 0 ]; then
            python - <<'PY'
          import xml.etree.ElementTree as ET
          try:
              root = ET.parse("pytest-results.xml").getroot()
          except Exception as exc:
              print("Could not parse junit xml:", exc)
          else:
              for case in root.iter("testcase"):
                  failure = case.find("failure")
                  error = case.find("error")
                  if failure is None and error is None:
                      continue
                  print("FAILED:", case.get("classname"), case.get("name"))
                  node = failure if failure is not None else error
                  text = (node.text or "").strip()
                  if text:
                      print(text[:1200])
          PY
            exit $code
          fi

  web-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://genetic-contour-platform.onrender.com

  deployment-gate:
    needs: [api-tests, web-lint-build]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All deployment gates passed"
