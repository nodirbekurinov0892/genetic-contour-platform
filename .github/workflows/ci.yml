name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: genetic_contour
          POSTGRES_PASSWORD: genetic_contour_secret
          POSTGRES_DB: genetic_contour_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genetic_contour"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://genetic_contour:genetic_contour_secret@localhost:5432/genetic_contour_test
          SECRET_KEY: test-secret-key-for-ci-only-32chars
          JWT_SECRET: test-jwt-secret-for-ci-only-32chars
          API_DEBUG: "true"
          STORAGE_BACKEND: local
          TRUSTED_HOSTS: testserver,localhost,127.0.0.1
          REDIS_URL: redis://localhost:6379/0
          EXPERIMENT_QUEUE_BACKEND: asyncio
          MPLBACKEND: Agg
        run: |
          set -o pipefail
          python -c "from importlib.metadata import version; print('pytest-timeout', version('pytest-timeout'))"
          pytest -vv --tb=short --junitxml=junit.xml --durations=15 2>&1 | tee pytest.log
          pytest_exit=${PIPESTATUS[0]}
          echo "## Pytest output (tail)" >> "$GITHUB_STEP_SUMMARY"
          tail -80 pytest.log >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Failed / errored tests" >> "$GITHUB_STEP_SUMMARY"
          grep -E "^(FAILED|ERROR|=+ FAILURES|=+ ERRORS)" pytest.log >> "$GITHUB_STEP_SUMMARY" || true
          grep -E "^tests/.*::" pytest.log | grep -E "FAILED|ERROR|Timeout" >> "$GITHUB_STEP_SUMMARY" || true
          python <<'PY'
          import os
          import pathlib
          import xml.etree.ElementTree as ET

          junit = pathlib.Path("junit.xml")
          log = pathlib.Path("pytest.log")
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary and junit.exists():
              root = ET.parse(junit).getroot()
              failures: list[str] = []
              for case in root.iter("testcase"):
                  name = f"{case.get('classname')}::{case.get('name')}"
                  for child in case:
                      if child.tag in ("failure", "error"):
                          msg = (child.get("message") or child.text or "failed").replace("\n", " ")[:300]
                          failures.append(f"{name} — {msg}")
              if failures:
                  with open(summary, "a", encoding="utf-8") as fh:
                      fh.write("\n## JUnit failures\n")
                      for item in failures:
                          fh.write(f"- {item}\n")
          elif summary and log.exists():
              failed = [line for line in log.read_text(encoding="utf-8", errors="replace").splitlines() if line.startswith(("FAILED ", "ERROR "))]
              if failed:
                  with open(summary, "a", encoding="utf-8") as fh:
                      fh.write("\n## Pytest failures\n")
                      for line in failed:
                          fh.write(f"- {line}\n")
          PY
          exit $pytest_exit
      - name: Annotate pytest failures
        if: failure()
        working-directory: apps/api
        run: |
          python <<'PY'
          import pathlib
          import xml.etree.ElementTree as ET

          junit = pathlib.Path("junit.xml")
          log = pathlib.Path("pytest.log")
          if junit.exists():
              root = ET.parse(junit).getroot()
              for case in root.iter("testcase"):
                  name = f"{case.get('classname')}::{case.get('name')}"
                  for child in case:
                      if child.tag in ("failure", "error"):
                          msg = (child.get("message") or child.text or "failed").replace("\n", " ")[:300]
                          print(f"::error::{name} — {msg}")
          elif log.exists():
              for line in log.read_text(encoding="utf-8", errors="replace").splitlines():
                  if line.startswith("FAILED ") or line.startswith("ERROR "):
                      print(f"::error::{line}")
          PY
      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            apps/api/junit.xml
            apps/api/pytest.log
          if-no-files-found: ignore

  web-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://genetic-contour-platform.onrender.com

  deployment-gate:
    needs: [api-tests, web-lint-build]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All deployment gates passed"
