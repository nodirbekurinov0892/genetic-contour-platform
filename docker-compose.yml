services:
  postgres:
    image: postgres:16-alpine
    container_name: genetic-contour-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genetic_contour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genetic_contour_secret}
      POSTGRES_DB: ${POSTGRES_DB:-genetic_contour}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genetic_contour}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genetic-contour-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
