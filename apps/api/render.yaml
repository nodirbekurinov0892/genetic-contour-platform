services:

  - type: web

    name: genetic-contour-api

    runtime: python

    rootDir: apps/api

    buildCommand: pip install -r requirements.txt

    startCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

    healthCheckPath: /health/ready

    envVars:

      - key: DATABASE_URL

        fromDatabase:

          name: genetic-contour-db

          property: connectionString

      - key: EXPERIMENT_QUEUE_BACKEND

        value: "asyncio"

      - key: API_PUBLIC_URL

        value: "https://genetic-contour-platform.onrender.com"

      - key: CORS_ORIGINS

        sync: false

      - key: SECRET_KEY

        generateValue: true

      - key: JWT_SECRET

        generateValue: true

      - key: TRUSTED_HOSTS

        sync: false

      - key: API_DEBUG

        value: "false"

      - key: STORAGE_BACKEND

        value: "supabase"

      - key: SUPABASE_URL

        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY

        sync: false

      - key: SUPABASE_STORAGE_BUCKET

        value: "genetic-contour-platform"

      - key: SUPABASE_PUBLIC_BASE_URL

        sync: false

      # Optional S3/R2 fallback — set STORAGE_BACKEND=s3 and S3_* instead of Supabase.

      - key: S3_ENDPOINT_URL

        sync: false

      - key: S3_ACCESS_KEY_ID

        sync: false

      - key: S3_SECRET_ACCESS_KEY

        sync: false

      - key: S3_BUCKET_NAME

        sync: false

      # Required for production persistence — set all SUPABASE_* (or S3_*) in Render dashboard before deploy.
      # STORAGE_BACKEND=local will fail startup when API_DEBUG=false.

      - key: S3_REGION

        value: "auto"

      - key: S3_PUBLIC_BASE_URL

        sync: false

      - key: SENTRY_DSN

        sync: false

      - key: SENTRY_ENVIRONMENT

        value: "production"



databases:

  - name: genetic-contour-db

    plan: free

    databaseName: genetic_contour

    user: genetic_contour

